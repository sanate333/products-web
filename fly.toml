app = "sanate-wa-bot"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  OPENAI_IMAGE_MODEL = "gpt-image-1"
  OPENAI_VISION_MODEL = "gpt-4.1-mini"
  OPENAI_MOCK = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "wa_data"
  destination = "/app/generated"
  initial_size = "1gb"
